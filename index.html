
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple & Educational Blog</title>
    <!-- Tailwind CSS CDN for demonstration. For production, consider a local setup -->
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <!-- Custom Theme CSS -->
    <link href="theme.css" rel="stylesheet">
    <style>
        /* Direct body padding */
        body {
            padding: 1.5rem; /* Equivalent to Tailwind's p-6 */
        }
    </style>
</head>
<body class="bg-gray-100">
    <!-- Simple Navbar -->
    <nav class="simple-navbar">
        <div class="responsive-container flex justify-between items-center">
            <div class="text-xl font-semibold">My Blog</div>
            <div>
                <a href="#" class="text-gray-800 hover:text-gray-600 px-3">Home</a>
                <a href="#" class="text-gray-800 hover:text-gray-600 px-3">Articles</a>
                <a href="#" class="text-gray-800 hover:text-gray-600 px-3">About</a>
            </div>
        </div>
    </nav>

    <!-- Content -->
    <div class="responsive-container mt-10">
        <h1>Welcome to My Educational Blog</h1>
        <p>This is a simple, responsive, and educational blog created to share knowledge and insights. The blog is designed with readability and simplicity in mind, using Tailwind CSS.</p>
    </div>

    <!-- Simple Footer -->
    <footer class="simple-footer mt-10">
        <div class="responsive-container">
            &copy; 2023 My Blog. All rights reserved.
        </div>
    </footer>
</body>
</html>
